<!doctype html>
<html lang="en">

<head>

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ProtoSynthesis Library</title>

  <!-- External Library Design System -->
  <link rel="stylesheet" href="/styles/library.css">

</head>

<body>

  <div class="glow"></div>

  <div class="container">

    <!-- HEADER -->
    <div class="center">

      <!-- LOGO (UNCHANGED) -->
      <img
        class="logo"
        src="assets/images/ProtoSynthesis 7Dot Logo Only Main ProtoGlyph Design 2.2.png"
        alt="ProtoSynthesis Logo"
      >

      <h1>ProtoSynthesis Library</h1>

      <div class="subtitle">
        Structured knowledge registry and content system
      </div>

      <!-- NAVIGATION (NEW BUT SAFE) -->
      <div class="buttons">

        <a class="btn" href="https://protosynthesis.co.uk">
          Main Site
        </a>

        <a class="btn" href="https://protosynthesis.co.uk/architecture/architecture-overview.html">
          Architecture
        </a>

      </div>

    </div>

    <!-- CONTENT -->
    <div class="content">

      <div id="content"></div>

    </div>

  </div>

  <script>

    async function loadRegistry() {

      try {

        const res = await fetch('/registry/registry.json');

        const data = await res.json();

        const container = document.getElementById('content');

        const library = data.library.content;

        function renderSection(title, items) {

          const section = document.createElement('div');
          section.className = 'section';

          const h2 = document.createElement('h2');
          h2.textContent = title;

          section.appendChild(h2);

          if (!items || items.length === 0) {

            const empty = document.createElement('div');
            empty.className = 'empty';
            empty.textContent = 'No items yet...';

            section.appendChild(empty);

          } else {

            items.forEach(item => {

              const div = document.createElement('div');
              div.className = 'item';

              div.innerHTML = `
                <strong>${item.title}</strong>
                <small>${item.id}</small>
                <small>${item.path}</small>
              `;

              section.appendChild(div);

            });

          }

          container.appendChild(section);

        }

        renderSection('Books', library.books);
        renderSection('Ebooks', library.ebooks);
        renderSection('Articles', library.articles);
        renderSection('Whitepapers', library.whitepapers);

      }

      catch (err) {

        document.getElementById('content').innerHTML =
          '<p>Registry not found or failed to load.</p>';

      }

    }

    loadRegistry();

  </script>
<footer class="footer">
  © ProtoSynthesis 2026–Present · Library Knowledge Registry · Living Knowledge System
</footer>
  
</body>

</html>
